services:
  postgres:
    image: postgres:16-alpine
    container_name: tarot-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tarot
      POSTGRES_PASSWORD: tarot
      POSTGRES_DB: tarot
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
